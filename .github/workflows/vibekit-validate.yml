name: vibekit-validate

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".vibekit/init/CLAUDE-template.md"
      - ".vibekit/init/FIRST_TIME_INIT.md"
      - "backbone.yml"
      - ".claude/**"
      - ".cursor/**"
      - ".agents/**"
      - ".codex-plugin/**"
      - ".vibekit/skills/**"
      - ".vibekit/commands/**"
      - ".vibekit/scripts/**"
      - ".vibekit/docs/**"
      - ".vibekit/init/**"
      - "install.sh"
      - "install.ps1"
      - "package.json"
      - ".github/workflows/vibekit-validate.yml"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Syntax, install behavior, and structure tests
        run: npm test
      - name: AgentShield read-only probe
        run: npm run security:probe
      - name: Verify npm package contents
        run: npm run pack:dry-run
