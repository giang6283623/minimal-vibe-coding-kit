# Minimal Vibe Coding Kit backbone template.
# Keep this file short. See docs/BACKBONE_REFERENCE.md for field details.
version: 2
meta:
  template_status: uninitialized
  initialized_at: null
  template_source: minimal-vibe-coding-kit
  schema_version: 3
  init_runbook: FIRST_TIME_INIT.md
  init_done_marker: .vibekit/INIT_DONE

project:
  name: <<PROJECT_NAME>>
  description: <<ONE_LINE_DESCRIPTION>>
  type: <<single-repo|monorepo|multi-repo>>
  primary_language: <<ts|js|py|go|rs|java|dotnet|php|ruby|mixed|unknown>>
  package_manager: <<npm|pnpm|yarn|bun|pip|poetry|uv|go|cargo|maven|gradle|dotnet|composer|bundler|none|unknown>>

paths:
  root: .
  apps: []
  source: []
  tests: []
  docs:
    - README.md
    - docs/
  generated:
    - node_modules/
    - dist/
    - build/
    - coverage/

commands:
  install: null
  test: null
  lint: null
  typecheck: null
  build: null
  validate: node scripts/validate-kit.mjs .

policy:
  default_branch: main
  branch_naming: "feat/<short-topic>"
  commit_style: conventional
  editable_paths:
    - .
  protected_paths:
    - .git/
    - .env*
    - "**/*secret*"
    - "**/*token*"
    - "**/migrations/**"
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/coverage/**"
    - "**/*lock*"

agent_surfaces:
  claude: .claude/
  cursor: .cursor/
  codex: .agents/
  codex_plugin: .codex-plugin/plugin.json
  shared_skills: skills/
  shared_commands: commands/

automation:
  autoresearch:
    results_file: results.tsv
    logs_dir: .autoresearch/logs
    default_budget: 3
    default_timeout_seconds: 600
  daily_enhance:
    report_dir: .vibekit/reports
    write_mode: propose_only
  security:
    probe: python skills/agentshield-security-review/scripts/agentshield_repo_probe.py .
    scan: npx ecc-agentshield scan --path . --format text --min-severity medium
